<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golu AI • Gemini Search Chat</title>

<meta name="description" content="Golu AI - Gemini Search Powered AI Chatbot by Golu Sarkar">

<style>
*{
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  margin:0;
  height:100vh;
  background: radial-gradient(circle at top, #0f2027, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

.app{
  width:100%;
  max-width:430px;
  background:#0d0d0d;
  border-radius:16px;
  box-shadow:0 0 30px rgba(0,234,255,0.15);
  overflow:hidden;
}

/* ===== BRAND HEADER ===== */
.header{
  background:linear-gradient(135deg,#00eaff,#0077ff);
  padding:16px;
  text-align:center;
}

.brand{
  font-size:26px;
  font-weight:800;
  letter-spacing:1px;
}

.tagline{
  font-size:12px;
  opacity:0.9;
}

/* ===== CHAT BODY ===== */
.body{
  padding:15px;
}

textarea{
  width:100%;
  height:85px;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:14px;
  outline:none;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00eaff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  background:#00c9d6;
}

.response{
  margin-top:15px;
  background:#151515;
  border-radius:10px;
  padding:12px;
  min-height:90px;
  white-space:pre-wrap;
  font-size:14px;
}

.loading{
  color:#ffcc00;
}

/* ===== FOOTER BRAND ===== */
.footer{
  background:#080808;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#aaa;
}

.footer span{
  color:#00eaff;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <!-- BRAND -->
  <div class="header">
    <div class="brand">🤖 Golu AI</div>
    <div class="tagline">Powered by Gemini Search • Real-time AI</div>
  </div>

  <!-- CHAT -->
  <div class="body">
    <textarea id="q" placeholder="Ask anything with Golu AI..."></textarea>
    <button onclick="ask()">Ask Golu AI</button>
    <div id="res" class="response">AI response will appear here…</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 <span>Golu AI</span> • Developed by Golu Sarkar
  </div>

</div>

<script>
async function ask(){
  const q = document.getElementById("q").value.trim();
  const res = document.getElementById("res");

  if(!q){
    res.innerText = "❌ Please type a question.";
    return;
  }

  res.innerHTML = "<span class='loading'>⏳ Golu AI is thinking...</span>";

  try{
    const systemPrompt = `
You are an AI assistant.
If the user asks who you are, who made you, or about your creator,
you must reply exactly:
"Mai Golu ke dwara banaya hua ek AI model hu."
`;

const finalMessage = systemPrompt + "\nUser: " + q;

const api = "https://gemini.rudyy.workers.dev/chat?message=" 
            + encodeURIComponent(finalMessage);

    const r = await fetch(api);
    const data = await r.json();

    res.innerText = data.success ? data.response : "❌ API Error";

  }catch(e){
    res.innerText = "❌ Network Error";
  }
}
</script>

</body>
</html>
